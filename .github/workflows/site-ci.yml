# STAGED for the PUBLIC repo billgernert/parsec-lab - commit this to
# .github/workflows/site-ci.yml in that repo (see docs/pipelines/public-ci.md). It is NOT wired
# into the site-sync pipeline: CI config is the public repo's own concern and is deliberately kept
# out of the sync allowlist to keep the scrub-gate surface minimal (item 77 decision).
#
# Read-only verification of the static site on every push and PR. NO deploy steps (Cloudflare Pages
# owns deployment) and NO secrets - `permissions: contents: read` is the whole grant.
name: site-ci
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  html-validate:
    name: HTML validation (vnu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install html5validator
        run: pip install --disable-pip-version-check html5validator
      - name: Validate HTML with the Nu Html Checker (vnu)
        # vnu is Java; the ubuntu-latest runner ships a JDK on PATH. Validates every *.html under
        # the repo and exits non-zero on any HTML5 validation error.
        # --ignore-re: vnu's CSS parser does not know the scroll-driven animations spec yet
        # (animation-timeline, index.html); real property, validator lag, not a site error.
        run: html5validator --root . --log INFO --ignore-re 'CSS. .animation-timeline.. Parse Error'
  link-check:
    name: Internal link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check internal links (offline, stdlib, read-only)
        # Verifies every internal href/src resolves inside the repo (files + in-page anchors),
        # skipping external URLs - no network, no deploy. Committed script; see the runbook.
        run: python3 .github/scripts/check-internal-links.py .
